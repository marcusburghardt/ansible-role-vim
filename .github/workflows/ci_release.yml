# Create release PRs and tags from conventional commits.
# Release-please analyzes commits since the last tag, opens a PR with
# version bump and changelog updates. Merging the PR creates the tag
# and GitHub Release, which triggers the Galaxy publish workflow.
---
name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-labeling: true
